<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comparison Oracle</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

:root{
--gold:#d4af37;
--gold-bright:#fcf6ba;
--bg-dark:#020202;
--glass:rgba(8,8,8,0.95);
--border:rgba(212,175,55,0.15);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
background:var(--bg-dark);
color:#fff;
font-family:'Inter',sans-serif;
min-height:100vh;
padding:20px;
display:flex;
justify-content:center;
}

/* CONTAINER */

.container{
width:100%;
max-width:900px;
background:var(--glass);
border:1px solid var(--border);
border-radius:30px;
padding:40px;
}

/* TITLE */

h2{
font-family:'Cinzel';
text-align:center;
letter-spacing:6px;
color:var(--gold-bright);
margin-bottom:8px;
font-size:clamp(22px,4vw,36px);
}

.tagline{
text-align:center;
font-size:10px;
letter-spacing:4px;
color:var(--gold);
margin-bottom:30px;
}

/* GRID */

.input-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:20px;
}

label{
font-size:11px;
color:var(--gold);
letter-spacing:2px;
margin-bottom:6px;
display:block;
}

input,textarea{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.1);
background:#000;
color:#fff;
font-size:14px;
}

textarea{
margin-top:8px;
min-height:90px;
resize:none;
}

/* BUTTON */

.btn-oracle{
margin-top:20px;
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,var(--gold-bright),var(--gold));
font-weight:800;
letter-spacing:3px;
cursor:pointer;
}

/* LOADER */

.loader{
display:none;
text-align:center;
margin-top:30px;
}

.loader i{
font-size:32px;
color:var(--gold);
animation:spin 1.5s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg)}
}

/* RESULT */

#resultZone{
display:none;
margin-top:35px;
}

.verdict-box{
border:1px solid var(--gold);
padding:25px;
border-radius:20px;
text-align:left;
max-height:50vh;
overflow-y:auto;
}

.final-label{
color:var(--gold);
font-size:11px;
letter-spacing:4px;
display:block;
margin-bottom:15px;
text-align:center;
}

#verdictText{
white-space:pre-line;
line-height:1.9;
font-size:15px;
}

/* MOBILE */

@media(max-width:650px){

.container{
padding:22px;
border-radius:20px;
}

.input-grid{
grid-template-columns:1fr;
}

textarea{
min-height:110px;
}

.verdict-box{
max-height:55vh;
}

}

</style>
</head>

<body>

<div class="container">

<h2>Comparison Oracle</h2>
<p class="tagline">BINARY_SYNTHESIS_PROTOCOL</p>

<div class="input-grid">

<div>
<label>COMPONENT_ALPHA</label>
<input id="option1" placeholder="Option A">
</div>

<div>
<label>COMPONENT_BETA</label>
<input id="option2" placeholder="Option B">
</div>

</div>

<label>GUIDING_GOAL</label>
<textarea id="myWish" placeholder="What is your goal?"></textarea>

<button class="btn-oracle" onclick="runOracle()">Initiate Synthesis</button>

<div class="loader" id="loader">
<i class="fas fa-circle-notch"></i>
<p style="margin-top:10px;color:var(--gold);font-size:12px;">Analyzing...</p>
</div>

<div id="resultZone">
<div class="verdict-box">
<span class="final-label">AI ANALYSIS</span>
<div id="verdictText"></div>
</div>
</div>

</div>

<script>

async function runOracle(){

const btn=document.querySelector('.btn-oracle')
const loader=document.getElementById('loader')
const result=document.getElementById('resultZone')

const o1=document.getElementById('option1').value.trim()
const o2=document.getElementById('option2').value.trim()
const goal=document.getElementById('myWish').value.trim()

loader.style.display="block"
result.style.display="none"
btn.disabled=true

try{

const res=await fetch("/compare_api",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({option1:o1,option2:o2,goal:goal})
})

const data=await res.json()

loader.style.display="none"
result.style.display="block"
btn.disabled=false

typeAIResult(data.reply)

}catch{

loader.style.display="none"
btn.disabled=false
document.getElementById("verdictText").innerHTML="⚠️ AI engine failed."

}

}

function typeAIResult(text){

const box=document.getElementById("verdictText")

text=text
.replace(/🅰️/g,"\n🅰️ Option A\n")
.replace(/🅱️/g,"\n🅱️ Option B\n")
.replace(/🎯/g,"\n\n🎯 Final Suggestion\n")

box.innerHTML=""

let i=0
function typing(){
if(i<text.length){
box.innerHTML+=text.charAt(i)
i++
setTimeout(typing,16)
}
}
typing()

}

</script>

</body>
</html>
