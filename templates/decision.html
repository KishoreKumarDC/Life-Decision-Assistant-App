<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Decision Oracle</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

:root{
--gold:#d4af37;
--gold-bright:#fcf6ba;
--bg:#050505;
--glass:rgba(15,15,15,.95);
--border:rgba(212,175,55,.15);
--point:rgba(255,255,255,.05);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
background:var(--bg);
font-family:'Plus Jakarta Sans';
min-height:100vh;
padding:20px;
display:flex;
justify-content:center;
}

.container{
width:100%;
max-width:820px;
background:var(--glass);
border:1px solid var(--border);
border-radius:30px;
padding:40px;
}

/* TITLE */

h1{
font-family:Cinzel;
letter-spacing:6px;
text-align:center;
margin-bottom:30px;
background:linear-gradient(to bottom,#fff,var(--gold-bright));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
font-size:clamp(22px,4vw,32px);
}

/* INPUT */

label{
font-size:11px;
letter-spacing:2px;
color:var(--gold);
margin-bottom:8px;
display:block;
}

textarea{
width:100%;
background:#000;
border:1px solid var(--border);
border-radius:16px;
padding:16px;
color:white;
font-size:14px;
min-height:140px;
resize:none;
outline:none;
}

/* BUTTON */

.btn{
width:100%;
padding:16px;
margin-top:20px;
border:none;
border-radius:14px;
background:linear-gradient(145deg,#FFD700,#D4AF37);
font-weight:800;
letter-spacing:3px;
cursor:pointer;
}

/* LOADER */

#loader{
display:none;
text-align:center;
margin:20px 0;
color:var(--gold);
}

/* RESULTS */

.results{
display:none;
margin-top:25px;
}

.point{
background:var(--point);
padding:12px;
border-radius:12px;
margin-bottom:10px;
font-size:14px;
}

#verdict{
margin-top:20px;
background:var(--point);
padding:18px;
border-radius:16px;
font-size:16px;
font-weight:700;
}

/* MOBILE */

@media(max-width:600px){

.container{
padding:20px;
border-radius:20px;
}

textarea{
font-size:13px;
min-height:120px;
}

}

</style>
</head>

<body>

<div class="container">

<h1>Decision Oracle</h1>

<label>Situation</label>
<textarea id="situation" placeholder="Describe your situation"></textarea>

<button class="btn" onclick="runDecision()">Analyze</button>

<div id="loader">Thinking...</div>

<div id="results" class="results">
<div id="analysis"></div>
<div id="verdict"></div>
</div>

</div>

<script>

async function runDecision(){

let situation=document.getElementById("situation").value.trim()
if(!situation) return

let loader=document.getElementById("loader")
let results=document.getElementById("results")
let analysis=document.getElementById("analysis")
let verdict=document.getElementById("verdict")

loader.style.display="block"
results.style.display="none"
analysis.innerHTML=""
verdict.innerHTML=""

try{

let res=await fetch("/decision_api",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({situation})
})

let data=await res.json()
loader.style.display="none"
results.style.display="block"

let text=data.reply
let lines=text.split("\n")

let final=""

lines.forEach(l=>{
if(l.toLowerCase().includes("decision")){
final=l.replace(/decision[:]?/i,"")
}else{
let div=document.createElement("div")
div.className="point"
typeText(l,div)
analysis.appendChild(div)
}
})

typeText(final,verdict)

}catch{

loader.style.display="none"
results.style.display="block"
analysis.innerHTML="AI Error"

}

}

function typeText(text,el){
let i=0
function t(){
if(i<text.length){
el.innerHTML+=text.charAt(i)
i++
setTimeout(t,12)
}
}
t()
}

</script>

</body>
</html>
