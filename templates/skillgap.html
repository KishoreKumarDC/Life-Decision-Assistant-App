<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Skill Gap Analyzer</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;600&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

:root{
--gold:#d4af37;
--gold-bright:#fcf6ba;
--bg-dark:#050505;
--glass:rgba(12,12,12,0.9);
--border:rgba(212,175,55,0.2);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
background:var(--bg-dark);
color:#fff;
font-family:'Montserrat';
min-height:100vh;
padding:20px;
display:flex;
justify-content:center;
}

/* CONTAINER */

.container{
width:100%;
max-width:850px;
background:var(--glass);
border:1px solid var(--border);
border-radius:28px;
padding:35px;
}

/* TITLE */

h2{
font-family:'Cinzel';
text-align:center;
letter-spacing:6px;
margin-bottom:6px;
background:linear-gradient(to bottom,#fff,var(--gold-bright));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
font-size:clamp(22px,4vw,34px);
}

.subtitle{
text-align:center;
font-size:11px;
color:var(--gold);
letter-spacing:4px;
margin-bottom:25px;
}

/* FORM */

.diagnostic-deck{
background:rgba(255,255,255,0.02);
padding:25px;
border-radius:18px;
border:1px solid var(--border);
margin-bottom:25px;
}

.input-group{
margin-bottom:18px;
}

label{
font-family:'Poppins';
font-size:11px;
color:var(--gold);
margin-bottom:6px;
display:block;
}

select,input{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.1);
background:rgba(0,0,0,0.6);
color:#fff;
font-size:14px;
}

#careerInput{
display:none;
margin-top:8px;
}

/* BUTTON */

.btn-diagnostic{
width:100%;
padding:16px;
border-radius:14px;
border:none;
cursor:pointer;
font-family:'Poppins';
font-weight:700;
letter-spacing:3px;
color:#000;
background:linear-gradient(135deg,var(--gold-bright),var(--gold));
}

/* RESULT */

#resultsArea{
display:none;
margin-top:25px;
}

.result-box{
border:1px solid var(--border);
padding:22px;
border-radius:16px;
background:#080808;
line-height:1.8;
font-size:14px;
max-height:55vh;
overflow-y:auto;
}

.result-box b{
color:var(--gold-bright);
}

/* CURSOR */

.cursor{
display:inline-block;
width:6px;
height:14px;
background:var(--gold);
margin-left:5px;
animation:blink .8s infinite;
}

@keyframes blink{
50%{opacity:0}
}

/* MOBILE */

@media(max-width:650px){

.container{
padding:20px;
border-radius:18px;
}

.diagnostic-deck{
padding:18px;
}

.result-box{
max-height:60vh;
}

}

</style>
</head>

<body>

<div class="container">

<h2>Skill Gap Analyzer</h2>
<p class="subtitle">AI Competency Diagnostic</p>

<div class="diagnostic-deck">

<form id="skillForm">

<div class="input-group">

<label>🎯 Target Career</label>

<select id="careerSelect">
<option value="">Select Career</option>
<option value="Machine Learning Engineer">Machine Learning Engineer</option>
<option value="Full Stack Developer">Full Stack Developer</option>
<option value="Cyber Security Analyst">Cyber Security Analyst</option>
<option value="Blockchain Developer">Blockchain Developer</option>
<option value="Data Scientist">Data Scientist</option>
<option value="Other">Other</option>
</select>

<input type="text" id="careerInput" placeholder="Enter your career">

</div>

<div class="input-group">

<label>💻 Your Current Skills</label>

<input type="text" id="skillsInput" placeholder="Example: Python, SQL, HTML">

</div>

<button class="btn-diagnostic" type="submit">
Analyze Skill Gap
</button>

</form>

</div>

<div id="resultsArea">
<div class="result-box" id="gapBox"></div>
</div>

</div>

<script>

const careerSelect=document.getElementById("careerSelect")
const careerInput=document.getElementById("careerInput")
const gapBox=document.getElementById("gapBox")
const resultsArea=document.getElementById("resultsArea")
const form=document.getElementById("skillForm")

careerSelect.addEventListener("change",()=>{
careerInput.style.display = careerSelect.value==="Other" ? "block" : "none"
})

form.addEventListener("submit",async(e)=>{

e.preventDefault()

const career = careerSelect.value==="Other"
? careerInput.value.trim()
: careerSelect.value

const skills=document.getElementById("skillsInput").value.trim()

if(!career || !skills) return

resultsArea.style.display="block"
gapBox.innerHTML="🤖 AI is analyzing your skills...<span class='cursor'></span>"

try{

const response=await fetch("/skillgap_api",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({career:career,skills:skills})
})

const data=await response.json()
typeAI(data.reply,gapBox)

}catch{
gapBox.innerHTML="⚠️ AI analysis failed."
}

})

function typeAI(text,element){

let processed=text
.replace(/\*\*(.*?)\*\*/g,'<b>$1</b>')
.replace(/\n/g,'<br>')
.replace(/•/g,"👉")

let i=0
element.innerHTML=""

function typing(){

if(i<processed.length){

if(processed[i]==="<"){
let tagEnd=processed.indexOf(">",i)
element.innerHTML+=processed.substring(i,tagEnd+1)
i=tagEnd+1
}else{
element.innerHTML+=processed[i]
i++
}

setTimeout(typing,14)

}else{
element.innerHTML+='<span class="cursor"></span>'
}

}

typing()

}

</script>

</body>
</html>
