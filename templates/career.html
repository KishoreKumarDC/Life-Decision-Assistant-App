<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Career Architect</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;600&family=Poppins:wght@400;600;700&family=Fira+Code:wght@400&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

:root{
--gold:#d4af37;
--gold-bright:#fcf6ba;
--bg-dark:#030303;
--glass:rgba(10,10,10,0.92);
--border:rgba(212,175,55,0.2);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
background:var(--bg-dark);
color:#fff;
font-family:'Montserrat',sans-serif;
min-height:100vh;
overflow-x:hidden;
}

/* MAIN CONTAINER */

.container{
max-width:950px;
width:100%;
margin:auto;
margin-top:20px;
margin-bottom:40px;
background:var(--glass);
backdrop-filter:blur(40px);
border-radius:30px;
padding:40px;
border:1px solid var(--border);
}

/* TITLE */

h2{
font-family:'Cinzel';
font-size:clamp(24px,5vw,40px);
text-align:center;
letter-spacing:6px;
margin-bottom:10px;
background:linear-gradient(to bottom,#fff,var(--gold-bright));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
text-align:center;
font-size:11px;
letter-spacing:4px;
color:var(--gold);
margin-bottom:30px;
}

/* FORM */

.form-deck{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:25px;
}

label{
display:block;
font-size:11px;
color:var(--gold);
margin-bottom:8px;
letter-spacing:1px;
font-family:Poppins;
}

select,input[type="text"]{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid var(--border);
background:#000;
color:white;
outline:none;
font-size:13px;
}

.custom-input{
display:none;
margin-top:8px;
border-style:dashed;
}

/* BUTTON */

.btn-architect{
grid-column:span 2;
padding:18px;
border-radius:14px;
border:none;
background:linear-gradient(145deg,#FFD700,#D4AF37);
cursor:pointer;
font-weight:700;
letter-spacing:3px;
}

/* RESULTS */

#careerResults{
display:none;
margin-top:30px;
}

.matrix-grid{
display:grid;
grid-template-columns:1fr 1.4fr;
gap:20px;
}

.stat-card{
background:#0b0b0b;
padding:20px;
border-radius:16px;
border:1px solid var(--border);
}

.stat-bar{
margin-bottom:18px;
}

.stat-meta{
display:flex;
justify-content:space-between;
font-size:10px;
color:var(--gold);
margin-bottom:6px;
}

.bar-bg{
height:4px;
background:#111;
}

.bar-fill{
height:100%;
background:var(--gold);
width:0%;
transition:1.5s;
}

.roadmap-terminal{
background:#000;
border:1px solid var(--border);
border-radius:16px;
padding:20px;
font-size:13px;
line-height:1.7;
min-height:200px;
overflow:auto;
}

.final-verdict{
text-align:center;
margin-top:25px;
padding:25px;
border-radius:20px;
border:1px solid var(--gold);
}

#finalPath{
font-family:'Cinzel';
font-size:20px;
}

/* MOBILE */

@media(max-width:768px){

.container{
padding:20px;
border-radius:20px;
}

.form-deck{
grid-template-columns:1fr;
}

.btn-architect{
grid-column:span 1;
width:100%;
}

.matrix-grid{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="container">

<h2>Career Architect</h2>
<p class="subtitle">Future Alignment Engine</p>

<form id="careerForm">

<div class="form-deck">

<div>
<label>DOMAIN</label>
<select id="interestSelect">
<option value="">Choose Field</option>
<option value="Artificial Intelligence">AI</option>
<option value="Cybersecurity">Cybersecurity</option>
<option value="Fintech">Fintech</option>
<option value="Biotech">Biotech</option>
<option value="Other">Other</option>
</select>
<input type="text" id="interestInput" class="custom-input" placeholder="Enter Domain">
</div>

<div>
<label>SKILL</label>
<select id="skillsSelect">
<option value="">Choose Skill</option>
<option value="Software">Software</option>
<option value="Leadership">Leadership</option>
<option value="Design">Design</option>
<option value="Data">Data</option>
<option value="Other">Other</option>
</select>
<input type="text" id="skillsInput" class="custom-input" placeholder="Enter Skill">
</div>

<button class="btn-architect">Synthesize Career</button>

</div>

</form>

<div id="careerResults">

<div class="matrix-grid">

<div class="stat-card">

<div class="stat-bar">
<div class="stat-meta"><span>Demand</span><span id="p1">0%</span></div>
<div class="bar-bg"><div id="b1" class="bar-fill"></div></div>
</div>

<div class="stat-bar">
<div class="stat-meta"><span>Growth</span><span id="p2">0%</span></div>
<div class="bar-bg"><div id="b2" class="bar-fill"></div></div>
</div>

<div class="stat-bar">
<div class="stat-meta"><span>Risk</span><span id="p3">0%</span></div>
<div class="bar-bg"><div id="b3" class="bar-fill"></div></div>
</div>

</div>

<div id="roadmapBox" class="roadmap-terminal"></div>

</div>

<div class="final-verdict">
<div id="finalPath"></div>
</div>

</div>

</div>

<script>

const form=document.getElementById("careerForm");
const results=document.getElementById("careerResults");
const roadmap=document.getElementById("roadmapBox");
const finalPath=document.getElementById("finalPath");

function setupDropdown(selectId,inputId){
const select=document.getElementById(selectId);
const input=document.getElementById(inputId);

select.addEventListener("change",()=>{
if(select.value==="Other"){
input.style.display="block";
input.focus();
}else{
input.style.display="none";
input.value="";
}
});
}

setupDropdown("interestSelect","interestInput");
setupDropdown("skillsSelect","skillsInput");

function getValue(selectId,inputId){
const sel=document.getElementById(selectId);
const inp=document.getElementById(inputId);
return sel.value==="Other"?inp.value.trim():sel.value;
}

form.addEventListener("submit",async(e)=>{
e.preventDefault();

const interest=getValue("interestSelect","interestInput");
const skills=getValue("skillsSelect","skillsInput");

if(!interest||!skills) return;

results.style.display="block";
roadmap.innerHTML="";
finalPath.innerHTML="";

animateStat('b1','p1',90);
animateStat('b2','p2',85);
animateStat('b3','p3',15);

try{
const res=await fetch("/career_api",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({interest,skills})
});

const data=await res.json();
typeText(data.reply,roadmap);

finalPath.innerHTML=`🚀 ${interest} Specialist`;

}catch{
roadmap.innerText="AI Error";
}

});

function animateStat(barId,textId,target){
document.getElementById(barId).style.width=target+"%";
let i=0;
let int=setInterval(()=>{
document.getElementById(textId).innerText=i+"%";
i++;
if(i>target) clearInterval(int);
},20);
}

function typeText(text,box){
let i=0;
function t(){
if(i<text.length){
box.innerHTML+=text.charAt(i);
i++;
setTimeout(t,12);
}
}
t();
}

</script>

</body>
</html>
