<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Goal Planner</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;600&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

:root{
--gold:#d4af37;
--gold-bright:#fcf6ba;
--bg-dark:#050505;
--glass-deep:rgba(10,10,10,0.9);
--border:rgba(212,175,55,0.2);
--accent-glow:rgba(212,175,55,0.1);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
background:var(--bg-dark);
color:#fff;
font-family:'Montserrat',sans-serif;
min-height:100vh;
padding:20px;
display:flex;
justify-content:center;
}

/* CONTAINER */

.container{
width:100%;
max-width:850px;
background:var(--glass-deep);
border:1px solid var(--border);
border-radius:28px;
padding:35px;
box-shadow:0 0 60px rgba(0,0,0,1);
}

/* TITLE */

h2{
font-family:'Cinzel';
text-align:center;
letter-spacing:5px;
margin-bottom:6px;
background:linear-gradient(to right,#fff,var(--gold-bright),#fff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
font-size:clamp(22px,4vw,34px);
}

.subtitle{
text-align:center;
font-size:11px;
color:var(--gold);
letter-spacing:4px;
margin-bottom:25px;
}

/* INPUT DECK */

.input-deck{
background:rgba(255,255,255,0.02);
padding:25px;
border-radius:18px;
border:1px solid var(--border);
margin-bottom:25px;
}

label{
font-family:'Poppins';
font-size:11px;
color:var(--gold);
margin-bottom:8px;
letter-spacing:2px;
display:block;
}

select,input{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.1);
background:rgba(0,0,0,0.5);
color:#fff;
font-size:14px;
outline:none;
}

#goalInput{
display:none;
margin-top:10px;
}

/* BUTTON */

.btn-manifest{
width:100%;
padding:16px;
border-radius:14px;
border:none;
cursor:pointer;
font-family:'Poppins';
font-weight:700;
letter-spacing:3px;
color:#000;
background:linear-gradient(135deg,var(--gold-bright),var(--gold));
margin-top:15px;
}

/* RESULT */

#resultsArea{
display:none;
margin-top:25px;
}

.result-box{
border:1px solid var(--border);
padding:22px;
border-radius:16px;
background:rgba(0,0,0,0.5);
line-height:1.8;
font-size:14px;
color:#eaeaea;
max-height:55vh;
overflow-y:auto;
}

/* CURSOR */

.cursor{
display:inline-block;
width:6px;
height:14px;
background:var(--gold);
margin-left:5px;
animation:blink .8s infinite;
}

@keyframes blink{
50%{opacity:0}
}

/* MOBILE */

@media(max-width:650px){

.container{
padding:20px;
border-radius:18px;
}

.input-deck{
padding:18px;
}

.result-box{
max-height:60vh;
}

}

b{
color:var(--gold-bright);
}

</style>
</head>

<body>

<div class="container">

<h2>Goal Planner</h2>
<p class="subtitle">AI Strategic Roadmap Generator</p>

<div class="input-deck">

<form id="goalForm">

<label>🎯 SELECT YOUR GOAL</label>

<select id="goalSelect">
<option value="">Select Goal</option>
<option value="Become AI Engineer">Become AI Engineer</option>
<option value="Financial Independence">Financial Independence</option>
<option value="Build Tech Startup">Build Tech Startup</option>
<option value="Full Stack Developer">Full Stack Developer</option>
<option value="Fitness Transformation">Fitness Transformation</option>
<option value="Other">Other</option>
</select>

<input type="text" id="goalInput" placeholder="Enter your goal">

<button type="submit" class="btn-manifest">
Generate AI Roadmap
</button>

</form>

</div>

<div id="resultsArea">
<div class="result-box" id="goalBox"></div>
</div>

</div>

<script>

const goalSelect=document.getElementById("goalSelect")
const goalInput=document.getElementById("goalInput")
const goalBox=document.getElementById("goalBox")
const resultsArea=document.getElementById("resultsArea")
const form=document.getElementById("goalForm")

goalSelect.addEventListener("change",()=>{
goalInput.style.display = goalSelect.value==="Other" ? "block" : "none"
})

form.addEventListener("submit",async(e)=>{

e.preventDefault()

const goalValue = goalSelect.value==="Other"
? goalInput.value.trim()
: goalSelect.value

if(!goalValue) return

resultsArea.style.display="block"
goalBox.innerHTML="🤖 AI is generating your roadmap...<span class='cursor'></span>"

try{

const response=await fetch("/goalplanner_api",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({goal:goalValue})
})

const data=await response.json()
typeAI(data.reply,goalBox)

}catch{
goalBox.innerHTML="⚠️ AI failed to generate roadmap."
}

})

function typeAI(text,element){

let processed=text
.replace(/\*\*(.*?)\*\*/g,'<b>$1</b>')
.replace(/\n/g,'<br>')
.replace(/•/g,"👉")

let i=0
element.innerHTML=""

function typing(){

if(i<processed.length){

if(processed[i]==="<"){
let tagEnd=processed.indexOf(">",i)
element.innerHTML+=processed.substring(i,tagEnd+1)
i=tagEnd+1
}else{
element.innerHTML+=processed[i]
i++
}

setTimeout(typing,14)

}else{
element.innerHTML+='<span class="cursor"></span>'
}

}

typing()

}

</script>

</body>
</html>
