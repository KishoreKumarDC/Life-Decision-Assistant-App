<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Oracle</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

:root{
--gold:#d4af37;
--gold-bright:#fcf6ba;
--bg:#050505;
--glass:rgba(12,12,12,.92);
--border:rgba(212,175,55,.2);
--ai:rgba(212,175,55,.06);
--user:rgba(255,255,255,.04);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
background:var(--bg);
font-family:Poppins;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* MAIN CONTAINER */

.container{
width:100%;
max-width:950px;
height:100vh;
display:flex;
flex-direction:column;
background:var(--glass);
border-left:1px solid var(--border);
border-right:1px solid var(--border);
}

/* HEADER */

header{
padding:18px 25px;
border-bottom:1px solid var(--border);
display:flex;
justify-content:space-between;
align-items:center;
background:#000;
}

header h2{
font-family:Cinzel;
letter-spacing:5px;
color:var(--gold);
font-size:18px;
}

.status{
font-family:Orbitron;
font-size:10px;
color:#00ff96;
}

/* CHAT AREA */

#chat-box{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:18px;
scroll-behavior:smooth;
}

/* MESSAGES */

.msg{
max-width:85%;
padding:14px 18px;
font-size:14px;
line-height:1.6;
}

.ai-msg{
background:var(--ai);
border-left:3px solid var(--gold);
border-radius:0 18px 18px 18px;
color:#ddd;
}

.user-msg{
background:var(--user);
align-self:flex-end;
border-radius:18px 18px 0 18px;
color:var(--gold-bright);
}

.ai-label{
font-size:9px;
letter-spacing:2px;
color:var(--gold);
display:block;
margin-bottom:6px;
}

/* INPUT */

.input-area{
padding:12px;
border-top:1px solid var(--border);
display:flex;
gap:10px;
background:#000;
position:sticky;
bottom:0;
}

.input-wrapper{
flex:1;
display:flex;
align-items:center;
background:#111;
border-radius:12px;
padding:0 12px;
border:1px solid var(--border);
}

#message{
flex:1;
padding:12px;
background:transparent;
border:none;
color:white;
outline:none;
font-size:14px;
}

.send-btn{
width:48px;
height:48px;
border:none;
border-radius:12px;
background:linear-gradient(145deg,#FFD700,#D4AF37);
cursor:pointer;
font-size:16px;
}

/* THINKING DOTS */

.thinking{
display:flex;
gap:5px;
}

.dot{
width:6px;
height:6px;
background:var(--gold);
border-radius:50%;
animation:blink 1.2s infinite;
}

.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}

@keyframes blink{
0%,100%{opacity:.3;transform:translateY(0)}
50%{opacity:1;transform:translateY(-4px)}
}

/* MOBILE */

@media(max-width:700px){

.container{
height:100vh;
border:none;
}

#chat-box{
padding:15px;
}

.msg{
font-size:13px;
max-width:92%;
}

header h2{
font-size:14px;
letter-spacing:3px;
}

}

</style>
</head>

<body>

<div class="container">

<header>
<h2>AI ORACLE</h2>
<div class="status">ONLINE</div>
</header>

<div id="chat-box">

<div class="msg ai-msg">
<span class="ai-label">SYSTEM</span>
Hello Kishor 👋  
Ask me anything about career, decision or goals.
</div>

</div>

<div class="input-area">
<div class="input-wrapper">
<input type="text" id="message" placeholder="Type message...">
</div>
<button class="send-btn" onclick="sendMessage()">
<i class="fas fa-bolt"></i>
</button>
</div>

</div>

<script>

const input=document.getElementById("message")
const chat=document.getElementById("chat-box")

input.addEventListener("keypress",e=>{
if(e.key==="Enter") sendMessage()
})

async function sendMessage(){

let msg=input.value.trim()
if(!msg) return

let user=document.createElement("div")
user.className="msg user-msg"
user.innerText=msg
chat.appendChild(user)

input.value=""
scrollBottom()

let ai=document.createElement("div")
ai.className="msg ai-msg"
ai.innerHTML=`<span class="ai-label">AI</span>
<div class="thinking"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`
chat.appendChild(ai)

scrollBottom()

try{

let res=await fetch("/chatbot_api",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:msg})
})

let data=await res.json()

ai.innerHTML=`<span class="ai-label">AI</span>`
typeText(data.reply,ai)

}catch{

ai.innerText="Error connecting AI"

}

}

function typeText(text,el){

let i=0
function t(){
if(i<text.length){
el.innerHTML+=text.charAt(i)
i++
scrollBottom()
setTimeout(t,12)
}
}
t()

}

function scrollBottom(){
chat.scrollTop=chat.scrollHeight
}

</script>

</body>
</html>
